<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 Wallchart — Brisbane Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Saira+Condensed:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:    oklch(0.16 0.03 285);
    --panel:  oklch(0.205 0.035 285);
    --panel2: oklch(0.255 0.04 285);
    --line:   oklch(1 0 0 / 0.10);
    --line2:  oklch(1 0 0 / 0.06);
    --text:   oklch(0.96 0.008 95);
    --muted:  oklch(0.72 0.02 280);
    --muted2: oklch(0.56 0.025 280);
    --gold:   oklch(0.84 0.13 88);
    --gold-d: oklch(0.84 0.13 88 / 0.16);
    --green:  oklch(0.80 0.14 156);
    --green-d:oklch(0.80 0.14 156 / 0.16);
    --amber:  oklch(0.78 0.15 60);
    --font-d: 'Archivo', sans-serif;
    --font-t: 'Saira Condensed', 'Archivo', sans-serif;
    --W: 2760px; --H: 1720px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font-d); background: #0a0b14; color: var(--text);
    overflow: hidden; -webkit-font-smoothing: antialiased; }

  #stagewrap { position: fixed; inset: 0; overflow: hidden; }
  #poster {
    position: absolute; left: 50%; top: 50%;
    width: var(--W); height: var(--H);
    transform-origin: center center;
    background:
      radial-gradient(70% 55% at 50% 30%, oklch(0.30 0.07 300) 0%, transparent 60%),
      radial-gradient(90% 90% at 50% 120%, oklch(0.13 0.04 295) 0%, transparent 70%),
      linear-gradient(160deg, oklch(0.20 0.055 295), oklch(0.13 0.035 290));
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.6);
  }
  #poster::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(oklch(1 0 0 / 0.04) 1px, transparent 1.4px);
    background-size: 30px 30px; opacity: 0.5;
  }

  svg.connectors { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  svg.connectors path { fill: none; stroke: var(--line); stroke-width: 2; }

  /* TITLE */
  .title { position: absolute; left: 50%; top: 38px; transform: translateX(-50%);
    text-align: center; width: 900px; z-index: 4; }
  .title .kick { display: inline-flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 800;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .title .kick i { width: 30px; height: 1px; background: var(--gold); display: inline-block; }
  .title h1 { font-family: var(--font-d); font-weight: 900; font-size: 76px; line-height: 0.9;
    letter-spacing: -0.03em; text-transform: uppercase; }
  .title h1 b { color: var(--gold); }
  .title .sub { font-family: var(--font-t); font-weight: 600; font-size: 27px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-top: 8px; }

  /* NEXT MATCH DAY CARD (centre) */
  #nextday { position: absolute; left: 50%; top: 250px; transform: translateX(-50%);
    width: 432px; z-index: 4; background: var(--panel); border: 1px solid var(--line);
    border-radius: 18px; padding: 18px 20px; box-shadow: 0 18px 50px rgba(0,0,0,0.42); }
  #nextday .nd-top { display: flex; flex-direction: column; gap: 2px; padding-bottom: 12px;
    border-bottom: 1px solid var(--line2); }
  #nextday .nd-label { font-size: 11px; font-weight: 800; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gold); }
  #nextday .nd-date { font-family: var(--font-t); font-weight: 600; font-size: 27px; color: var(--text); }
  #nextday .nd-date b { font-weight: 700; }
  #nextday .nd-count { display: flex; flex-direction: column; gap: 8px; align-items: center;
    padding: 13px 0; border-bottom: 1px solid var(--line2); }
  #nextday .cd-to { font-size: 12px; color: var(--muted); font-weight: 600; text-align: center; }
  #nextday .cd-to b { color: var(--text); font-weight: 700; }
  #nextday .cd-units { display: flex; gap: 10px; }
  #nextday .cseg { display: flex; flex-direction: column; align-items: center; min-width: 48px;
    background: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 7px 4px; }
  #nextday .cseg b { font-family: var(--font-t); font-weight: 700; font-size: 29px; line-height: 1; color: var(--gold); }
  #nextday .cseg i { font-style: normal; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted2); margin-top: 4px; }
  #nextday .kob { font-family: var(--font-t); font-weight: 700; font-size: 22px; color: var(--green); }
  #nextday .nd-list { display: flex; flex-direction: column; padding-top: 6px; }
  #nextday .nd-row { display: grid; grid-template-columns: 52px 1fr auto; align-items: center; gap: 10px;
    padding: 7px 4px; border-top: 1px solid var(--line2); cursor: pointer; border-radius: 6px; }
  #nextday .nd-row:first-child { border-top: none; }
  #nextday .nd-row:hover { background: var(--panel2); }
  #nextday .nd-t { font-family: var(--font-t); font-weight: 700; font-size: 16px; color: var(--gold); }
  #nextday .nd-m { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #nextday .nd-m em { font-style: normal; color: var(--muted2); font-weight: 600; margin: 0 5px; }
  #nextday .nd-g { font-family: var(--font-t); font-size: 11px; color: var(--muted2); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; }
  #nextday .nd-more { text-align: center; font-size: 11px; color: var(--muted2); padding-top: 8px; }
  #nextday .nd-done { text-align: center; font-family: var(--font-t); font-weight: 700; font-size: 22px; padding: 18px; }

  /* TIMEZONE SWITCHER */
  #tzpick { position: absolute; left: 22px; top: 22px; z-index: 10; display: flex; align-items: center;
    gap: 9px; background: var(--panel); border: 1px solid var(--line); border-radius: 100px; padding: 6px 8px 6px 15px; }
  #tzpick .tzlab { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2); }
  #tzpick select { font-family: var(--font-d); font-weight: 700; font-size: 13px; color: var(--text);
    background: var(--ink); border: 1px solid var(--line); border-radius: 100px; padding: 6px 11px; cursor: pointer; }

  /* GROUP PANELS */
  .gpanel { position: absolute; top: 170px; bottom: 70px; width: 300px;
    display: flex; flex-direction: column; gap: 14px; z-index: 3; }
  .gpanel.left { left: 24px; }
  .gpanel.right { right: 24px; }

  .gcard { flex: 1; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
  .ghead { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: var(--gold); color: var(--ink); }
  .gcard.soc .ghead { background: var(--green); }
  .ghead .gnm { font-family: var(--font-t); font-weight: 700; font-size: 19px;
    letter-spacing: 0.03em; flex: 1; }
  .ghead .gflags { display: flex; gap: 3px; font-size: 16px; }

  .grow { display: grid; grid-template-columns: 44px 48px 1fr 32px; align-items: center; gap: 6px;
    padding: 0 11px; flex: 1; font-size: 13px; cursor: pointer;
    border-top: 1px solid var(--line2); transition: background 0.12s; }
  .grow:hover { background: var(--panel2); }
  .grow .gd { font-family: var(--font-t); font-weight: 600; color: var(--muted2); font-size: 13px; }
  .grow .gt { font-family: var(--font-t); font-weight: 700; color: var(--gold); font-size: 14px; }
  .gcard.soc .grow .gt { color: var(--green); }
  .grow .gm { display: flex; align-items: center; gap: 5px; font-weight: 700;
    letter-spacing: 0.01em; white-space: nowrap; }
  .grow .gm i { font-style: normal; font-size: 14px; }
  .grow .gm em { font-style: normal; color: var(--muted2); font-weight: 600;
    font-size: 11px; margin: 0 1px; }
  .grow .gr { text-align: right; font-family: var(--font-t); font-weight: 700;
    color: var(--muted2); font-size: 13px; }
  .grow .gr.done { color: var(--text); }
  .grow .gr.live { color: var(--green); animation: blink 1s infinite; }
  .wcell { display: none; }
  /* GROUP — WHO'S THROUGH */
  .gstand { display: flex; align-items: center; gap: 10px; padding: 5px 11px;
    border-top: 1px solid var(--line); background: rgba(0,0,0,0.20); }
  .gstand .qln { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-t);
    font-weight: 700; font-size: 12px; color: var(--text); }
  .gstand .qln i { font-style: normal; color: var(--muted2); font-weight: 600; font-size: 10px; }
  .gstand .qdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .gstand .q1 .qdot { background: var(--gold); }
  .gstand .q2 .qdot { background: var(--muted); }
  .gstand .qtag { margin-left: auto; font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted2); }
  .gstand.locked .qtag { color: var(--green); }
  .gstand.locked .q1 .qdot { box-shadow: 0 0 0 2px var(--gold-d); }
  /* GROUP CARD: fixtures/table toggle */
  .ghead .gtog { margin-left: auto; display: flex; gap: 3px; background: rgba(0,0,0,0.20);
    border-radius: 7px; padding: 2px; }
  .ghead .gtog button { font-family: var(--font-d); font-weight: 800; font-size: 10px;
    border: none; background: none; color: rgba(0,0,0,0.55); padding: 3px 8px; border-radius: 5px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em; }
  .ghead .gtog button.on { background: var(--ink); color: var(--text); }
  /* GROUP STANDINGS TABLE */
  .stable { display: flex; flex-direction: column; padding: 2px 0; }
  .strow { display: grid; grid-template-columns: 17px 1fr 16px 16px 16px 16px 20px 20px 22px;
    align-items: center; gap: 2px; padding: 5px 10px; font-family: var(--font-t); font-weight: 600;
    font-size: 12px; border-top: 1px solid var(--line2); }
  .strow span { text-align: center; color: var(--muted); }
  .strow .stt { text-align: left; display: flex; align-items: center; gap: 5px; font-weight: 700; color: var(--text); }
  .strow .stt i { font-style: normal; font-size: 13px; }
  .strow .stp { color: var(--text); font-weight: 700; }
  .strow.sthead { border-top: none; }
  .strow.sthead span, .strow.sthead .stt { color: var(--muted2); font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.04em; font-family: var(--font-d); font-weight: 800; }
  .strow.q1 { box-shadow: inset 3px 0 0 var(--gold); }
  .strow.q2 { box-shadow: inset 3px 0 0 var(--muted); }
  .stable .stnone { padding: 22px 10px; text-align: center; color: var(--muted2); font-size: 12px; }

  /* BRACKET BOXES */
  .kbox { position: absolute; z-index: 3; background: var(--panel); border: 1px solid var(--line);
    border-radius: 11px; padding: 9px 11px; display: flex; flex-direction: column; cursor: pointer;
    transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s; }
  .kbox:hover { border-color: var(--gold); transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .kbox.kbox-live { border-color: var(--green) !important;
    box-shadow: 0 0 18px oklch(0.80 0.14 156 / 0.3); }
  .kbox .khd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .kbox .khd .stg { font-family: var(--font-t); font-weight: 700; font-size: 12px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
  .kbox .khd .mno { font-family: var(--font-t); font-size: 11px; color: var(--muted2); font-weight: 600; }
  .kteam { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .kteam .tk { width: 30px; flex-shrink: 0; text-align: center; font-family: var(--font-t);
    font-weight: 700; font-size: 13px; color: var(--ink); background: var(--muted);
    border-radius: 5px; padding: 2px 0; }
  .kteam .knm { font-size: 13px; font-weight: 600; color: var(--muted); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .kteam .ksc { margin-left: auto; font-family: var(--font-t); font-weight: 700;
    font-size: 16px; color: var(--text); }
  .kteam.real .knm { color: var(--text); }
  .kteam.real .tk { background: var(--gold); color: var(--ink); }
  .kfoot { display: flex; justify-content: space-between; align-items: baseline;
    margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--line2); }
  .kfoot .kdate { font-family: var(--font-t); font-size: 15px; color: var(--muted);
    font-weight: 700; letter-spacing: 0.02em; }
  .kfoot .ktime { font-family: var(--font-t); font-weight: 700; font-size: 17px; color: var(--text); }
  .kbox .alarm { position: absolute; top: 9px; right: 9px; width: 7px; height: 7px;
    border-radius: 50%; display: none; }
  .kbox.final { border-color: var(--gold);
    background: linear-gradient(160deg, var(--gold-d), var(--panel)); }
  .kbox.final .stg { font-size: 15px; }
  .kbox.bronze { border-style: dashed; }
  .roundlabel { position: absolute; z-index: 3; font-family: var(--font-t); font-weight: 700;
    font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted2); text-align: center; }

  /* LEGEND */
  .legend { position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
    display: flex; gap: 24px; font-size: 14px; color: var(--muted); z-index: 4;
    background: oklch(0.18 0.03 285 / 0.7); border: 1px solid var(--line);
    border-radius: 100px; padding: 9px 22px; backdrop-filter: blur(4px); }
  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  /* LIVE STATUS PILL */
  #livestatus { position: absolute; top: 22px; right: 22px; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 100px; padding: 7px 16px; font-size: 12px; }
  #livestatus .ldot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  #livestatus[data-state=init] .ldot,
  #livestatus[data-state=loading] .ldot { background: var(--amber); animation: blink 0.9s infinite; }
  #livestatus[data-state=live] .ldot { background: var(--green); animation: blink 0.7s infinite; }
  #livestatus[data-state=ok] .ldot { background: var(--gold); }
  #livestatus[data-state=error] .ldot { background: oklch(0.65 0.2 25); }
  #livestatus .ltxt { font-weight: 700; color: var(--text); }
  #livestatus .ltime { color: var(--muted2); padding-left: 2px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* MODAL */
  #scrim { position: fixed; inset: 0; background: oklch(0.08 0.02 285 / 0.74);
    backdrop-filter: blur(6px); z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 24px; }
  #scrim.on { display: flex; animation: fade 0.18s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .detail { width: 480px; max-width: 100%; background: var(--panel); border: 1px solid var(--line);
    border-radius: 18px; max-height: 88vh; overflow-y: auto; animation: pop 0.2s cubic-bezier(.2,.8,.3,1.2); }
  @keyframes pop { from { transform: scale(0.94) translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
  .dhead { padding: 18px 22px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(90deg, var(--gold-d), transparent); }
  .dhead .dstg { font-family: var(--font-t); font-weight: 700; font-size: 22px;
    letter-spacing: 0.04em; color: var(--gold); }
  .dhead.soc { background: linear-gradient(90deg, var(--green-d), transparent); }
  .dhead.soc .dstg { color: var(--green); }
  .dhead .dmno { margin-left: auto; font-family: var(--font-t); font-size: 14px;
    color: var(--muted2); font-weight: 600; }
  .dmatch { padding: 24px 22px; display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 14px; }
  .dteam { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
  .dteam .dfl { font-size: 46px; line-height: 1; }
  .dteam .dnm { font-weight: 800; font-size: 19px; letter-spacing: -0.01em; }
  .dteam.ph .dnm { color: var(--muted); font-size: 16px; }
  .dteam .dtk { font-family: var(--font-t); font-weight: 700; font-size: 13px;
    color: var(--ink); background: var(--muted); border-radius: 6px; padding: 3px 9px; }
  .dvs { font-family: var(--font-t); font-weight: 700; font-size: 26px; color: var(--muted2); }
  .dvs.score { color: var(--text); font-size: 34px; }
  .dvs.live { color: var(--green); font-size: 34px; }
  .dmeta { padding: 0 22px 22px; display: flex; flex-direction: column; gap: 1px; }
  .drow { display: flex; align-items: center; gap: 12px; padding: 13px 4px;
    border-top: 1px solid var(--line2); }
  .drow .dk { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted2); font-weight: 700; width: 120px; flex-shrink: 0; }
  .drow .dv { font-weight: 600; font-size: 15px; }
  .drow .dv b { font-family: var(--font-t); font-weight: 700; font-size: 21px; }
  .drow .dv .ap { color: var(--muted); font-size: 14px; }
  .drow .dv small { color: var(--muted); font-weight: 500; }
  .dclose { position: absolute; top: 20px; right: 24px; width: 36px; height: 36px;
    border-radius: 50%; border: 1px solid var(--line); background: var(--panel);
    color: var(--muted); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 101; }
  .dclose:hover { color: var(--text); border-color: var(--muted); }
  .dhint { text-align: center; color: var(--muted2); font-size: 12px; padding-bottom: 18px;
    letter-spacing: 0.04em; }

  .zoomhint { position: fixed; left: 16px; bottom: 16px; z-index: 50;
    font-size: 12.5px; color: var(--muted2); background: oklch(0.18 0.03 285 / 0.7);
    border: 1px solid var(--line); border-radius: 100px; padding: 7px 16px;
    pointer-events: none; transition: opacity 0.5s; }

  /* PRINT */
  @media print {
    @page { size: 420mm 297mm; margin: 7mm; }
    body { background: #fff !important; overflow: visible; }
    #stagewrap { position: static; width: 1500px; height: 935px; overflow: hidden; }
    #poster { position: static !important; left: auto !important; top: auto !important;
      transform: scale(0.5435) !important; transform-origin: top left !important; box-shadow: none; }
    .zoomhint, .dclose, #livestatus { display: none !important; }
    #scrim { display: none !important; }
    .legend { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .kteam .wcell { display: inline-block; width: 30px; height: 19px; margin-left: auto;
      border: 1.5px solid #b9893a; border-radius: 4px; background: #fff; }
    .grow .gr.empty { color: transparent; border: 1.2px solid #b9893a; border-radius: 3px; height: 15px; }
  }
</style>
</head>
<body>

<div id="stagewrap">
  <div id="poster">
    <div id="tzpick">
      <span class="tzlab">Times in</span>
      <select id="tzsel"></select>
    </div>
    <div class="title">
      <div class="kick" id="tzkick"><i></i>Brisbane Time · AEST (UTC+10)<i></i></div>
      <h1>FIFA World Cup <b>2026</b></h1>
      <div class="sub">Match Schedule &amp; Bracket</div>
    </div>

    <div id="nextday"></div>

    <div class="gpanel left" id="gpanelL"></div>
    <div class="gpanel right" id="gpanelR"></div>

    <svg class="connectors" id="conn" viewBox="0 0 2760 1720" preserveAspectRatio="none"></svg>
    <div id="bracket"></div>

    <div class="legend">
      <span><i style="background:var(--amber)"></i>Before 7am</span>
      <span><i style="background:var(--gold)"></i>7–11am</span>
      <span><i style="background:var(--green)"></i>Midday+</span>
      <span style="color:var(--muted2)">Tap any match for details</span>
    </div>

    <div id="livestatus" data-state="init">
      <span class="ldot"></span>
      <span class="ltxt">Connecting…</span>
      <span class="ltime"></span>
    </div>
  </div>
</div>

<div class="zoomhint" id="zoomhint">Scroll to zoom · drag to pan · double-click to reset</div>

<div id="scrim">
  <div class="detail" id="detail"></div>
  <button class="dclose" id="dclose" aria-label="Close">&#x2715;</button>
</div>

<script src="image-slot.js"></script>
<script>
// ===================== DATA =====================
const VENUE = {
  "Mexico City":"Estadio Azteca","Guadalajara":"Estadio Akron","Monterrey":"Estadio BBVA",
  "Toronto":"BMO Field","Vancouver":"BC Place","Atlanta":"Mercedes-Benz Stadium",
  "Boston":"Gillette Stadium","Dallas":"AT&T Stadium","Houston":"NRG Stadium",
  "Kansas City":"Arrowhead Stadium","Los Angeles":"SoFi Stadium","Miami":"Hard Rock Stadium",
  "New York New Jersey":"MetLife Stadium","Philadelphia":"Lincoln Financial Field",
  "San Francisco":"Levi's Stadium","Seattle":"Lumen Field"
};

function P(iso) {
  const [d,t] = iso.split("T");
  const [y,mo,da] = d.split("-").map(Number);
  const [h,mi] = t.split("+")[0].split(":").map(Number);
  const wd = new Date(Date.UTC(y,mo-1,da,12)).getUTCDay();
  return {y,mo,da,h,mi,wd};
}
function t12(h,mi) { const ap=h<12?"AM":"PM"; let hr=h%12; if(!hr)hr=12;
  return {hm:hr+(mi?":"+String(mi).padStart(2,"0"):""),ap}; }

function utcLabel(off){ const h=Math.floor(off/60), m=off%60; return "UTC+"+(m?h+":"+String(m).padStart(2,"0"):h); }
function PZ(iso){ const d=new Date(Date.parse(iso)+ZONES[ZONE].off*60000);
  return {y:d.getUTCFullYear(),mo:d.getUTCMonth()+1,da:d.getUTCDate(),h:d.getUTCHours(),mi:d.getUTCMinutes(),wd:d.getUTCDay()}; }
function timeBNE(iso) { const p=PZ(iso); return t12(p.h,p.mi); }
function dShort(iso) { const p=PZ(iso); return DAYS[p.wd]+" "+p.da+" "+MON[p.mo-1]; }
function dLong(iso)  { const p=PZ(iso); return DAYL[p.wd]+" "+p.da+" "+MON[p.mo-1]; }
function dDM(iso)    { const p=PZ(iso); return String(p.da).padStart(2,"0")+"/"+String(p.mo).padStart(2,"0"); }
function t24(iso)    { const p=PZ(iso); return String(p.h).padStart(2,"0")+":"+String(p.mi).padStart(2,"0"); }
function alarm(iso)  { const p=PZ(iso); const m=p.h*60+p.mi;
  return m<420?"var(--amber)":m<660?"var(--gold)":"var(--green)"; }
function venueLocal(o) {
  const off=TZ[o.city]; if(off===undefined) return null;
  const d = new Date(new Date(o.iso).getTime() + off*3600000);
  const h=d.getUTCHours(),mi=d.getUTCMinutes(),wd=d.getUTCDay(),da=d.getUTCDate(),mo=d.getUTCMonth();
  const tt=t12(h,mi);
  return {txt:DAYS[wd]+" "+da+" "+MON[mo]+", "+tt.hm+" "+tt.ap, zone:TZLABEL[String(off)]||"local"};
}

function token(name) {
  let m;
  if ((m=name.match(/^Winner ([A-L])$/)))    return "1"+m[1];
  if ((m=name.match(/^Runner-up ([A-L])$/))) return "2"+m[1];
  if (/^3rd/.test(name))                     return "3rd";

  if ((m=name.match(/^Loser (\d+)$/)))       return "L"+m[1];
  return CODE[name] || name.slice(0,3).toUpperCase();
}

  return name;
}

function computeStandings() {
  STAND = {}; QUAL = {};
  "ABCDEFGHIJKL".split("").forEach(g => {
    const teams = [...new Set(GROUP_MATCHES.filter(x=>x[4]===g).flatMap(x=>[x[2],x[3]]))];
    const tab = {}; teams.forEach(t => tab[t] = {team:t,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0});
    let played=0, total=0;
    ALL.filter(o => !o.isKo && o.grp===g).forEach(o => {
      total++;
      const sc = SCORES[o.id]; if(!sc) return;
      played++;
      const [x,y]=sc, A=tab[o.a], B=tab[o.b];
      A.P++; B.P++; A.GF+=x; A.GA+=y; B.GF+=y; B.GA+=x;
      if(x>y){ A.W++; B.L++; A.Pts+=3; }
      else if(x<y){ B.W++; A.L++; B.Pts+=3; }
      else { A.D++; B.D++; A.Pts++; B.Pts++; }
    });
    const rows = teams.map(t=>tab[t]).sort((a,b)=>
      b.Pts-a.Pts || (b.GF-b.GA)-(a.GF-a.GA) || b.GF-a.GF || a.team.localeCompare(b.team));
    rows.forEach((r,i)=>r.pos=i+1);
    const complete = total>0 && played===total;
    STAND[g] = {rows, complete, played};
    if(complete) QUAL[g] = [rows[0].team, rows[1].team, rows[2].team];
  });
}
function thirdStat(g){ const r=STAND[g].rows[2]; return {team:r.team, g, Pts:r.Pts, GD:r.GF-r.GA, GF:r.GF}; }

function resolveBracket() {

  // eight best third-placed teams, assigned to their allowed R32 slots
  const thirds = Object.keys(QUAL).map(thirdStat)
    .sort((a,b)=> b.Pts-a.Pts || b.GD-a.GD || b.GF-a.GF).slice(0,8);
  const used = new Set();
  KO_MATCHES.forEach(m => {
    [2,3].forEach(idx => {
      const slot=m[idx]; if(!/^3rd/.test(slot)) return;
      const allowed = slot.replace("3rd ","").split("/");
      const pick = thirds.find(t => !used.has(t.team) && allowed.includes(t.g));
      if(pick){ used.add(pick.team); RES[slot+"@"+m[6]]=pick.team; }
    });
  });
  // cascade knockout winners/losers
  for(let pass=0; pass<6; pass++){
    KO_MATCHES.forEach(m => {
      const no=m[6], o=byNo[no];
      const a=resolveSlot(m[2],no), b=resolveSlot(m[3],no);
      if(!a||!b) return;
      const sc=SCORES[o.id]; if(!sc) return;
      let w,l;
      if(sc[0]>sc[1]){ w=a; l=b; }
      else if(sc[1]>sc[0]){ w=b; l=a; }
      else { const wn=APIRAW[o.id]?.score?.winner;
        if(wn==="HOME_TEAM"){w=a;l=b;} else if(wn==="AWAY_TEAM"){w=b;l=a;} }
      if(w){ KOWIN[no]=w; KOLOSE[no]=l; }
    });
  }
}
function resolveSlot(slot, no){
  let m;
  if(/^3rd/.test(slot))                  return RES[slot+"@"+no] || null;
  if((m=slot.match(/^Winner (\d+)$/)))   return KOWIN[m[1]]  || null;
  if((m=slot.match(/^Loser (\d+)$/)))    return KOLOSE[m[1]] || null;
  if(RES[slot])                          return RES[slot];          // Winner/Runner-up of a group
  if(known(slot))                        return slot;               // already a real team
  return null;
}
function slotDisplay(o, slot){ return resolveSlot(slot, o.no) || slot; }

// ===================== NEXT MATCH DAY (centre) =====================
function renderNextDay(){
  const el=document.getElementById("nextday"); if(!el) return;
  const now=Date.now();
  const up = ALL.filter(o => Date.parse(o.iso) > now - 7200000) // include games kicked off <2h ago
               .sort((a,b)=> Date.parse(a.iso)-Date.parse(b.iso));
  const future = up.filter(o => Date.parse(o.iso) > now);
  if(!future.length){ el.innerHTML = `<div class="nd-done">Tournament complete &#x1F3C6;</div>`; ndTarget=null; return; }
  const next = future[0];
  const np = PZ(next.iso);
  const key = np.y+"-"+np.mo+"-"+np.da;
  const day = up.filter(o => { const q=PZ(o.iso); return q.y+"-"+q.mo+"-"+q.da===key; });
  const nm = (o,s) => { const r=slotDisplay(o,s); return known(r) ? `${FLAG[r]} ${CODE[r]}` : token(s); };
  ndTarget = Date.parse(next.iso);
  ndName = `${nm(next,next.a)} v ${nm(next,next.b)}`;
  el.innerHTML = `
    <div class="nd-top">
      <div class="nd-label">Next match day &middot; ${ZONES[ZONE].label} time</div>
      <div class="nd-date">${DAYL[np.wd]} <b>${np.da} ${MON[np.mo-1]}</b></div>
    </div>
    <div class="nd-count" id="ndcount"></div>
    <div class="nd-list">
      ${day.slice(0,6).map(o => `<div class="nd-row" data-id="${o.id}">
        <span class="nd-t">${t24(o.iso)}</span>
        <span class="nd-m">${nm(o,o.a)} <em>v</em> ${nm(o,o.b)}</span>
        <span class="nd-g">${o.isKo?(STAGE_NAME[o.grp]||o.grp):"Grp "+o.grp}</span>
      </div>`).join("")}
      ${day.length>6 ? `<div class="nd-more">+${day.length-6} more that day</div>` : ""}
    </div>`;
  tickCount();
}
function tickCount(){
  const el=document.getElementById("ndcount"); if(!el) return;
  if(ndTarget==null){ el.innerHTML=""; return; }
  let diff = ndTarget - Date.now();
  if(diff<=0){ el.innerHTML = `<span class="kob">Kicking off now &#x26BD;</span>`; return; }
  const d=Math.floor(diff/86400000); diff-=d*86400000;
  const h=Math.floor(diff/3600000);  diff-=h*3600000;
  const m=Math.floor(diff/60000);    diff-=m*60000;
  const s=Math.floor(diff/1000);
  const seg=(n,l)=>`<span class="cseg"><b>${String(n).padStart(2,"0")}</b><i>${l}</i></span>`;
  el.innerHTML = `<div class="cd-to">Kick-off in &mdash; <b>${ndName}</b></div>
    <div class="cd-units">${d?seg(d,"days"):""}${seg(h,"hrs")}${seg(m,"min")}${seg(s,"sec")}</div>`;
}

// ===================== RENDER =====================
function groupCard(g) {
  const ms    = ALL.filter(o => !o.isKo && o.grp===g);
  const teams = [...new Set(GROUP_MATCHES.filter(x=>x[4]===g).flatMap(x=>[x[2],x[3]]))];
  const soc   = teams.includes("Australia");
  const flags = teams.map(t => FLAG[t]||"").join("");
  const rows  = ms.map(o => {
    const sc=SCORES[o.id], lv=LIVE[o.id];
    const res = sc   ? `<span class="gr done">${sc[0]}&ndash;${sc[1]}</span>` :
                lv!=null ? `<span class="gr live">${lv?lv+"'":"LIVE"}</span>` :
                           `<span class="gr empty">&ndash;</span>`;
    return `<div class="grow" data-id="${o.id}">
      <span class="gd">${dDM(o.iso)}</span>
      <span class="gt">${t24(o.iso)}</span>
      <span class="gm"><i>${FLAG[o.a]}</i>${CODE[o.a]}<em>v</em><i>${FLAG[o.b]}</i>${CODE[o.b]}</span>
      ${res}</div>`;
  }).join("");
  const st = STAND[g];
  let foot = "";
  if(st && st.played>0){
    const r1=st.rows[0], r2=st.rows[1];
    foot = `<div class="gstand${st.complete?" locked":""}">
      <span class="qln q1"><span class="qdot"></span>${CODE[r1.team]} <i>${r1.Pts}p</i></span>
      <span class="qln q2"><span class="qdot"></span>${CODE[r2.team]} <i>${r2.Pts}p</i></span>
      <span class="qtag">${st.complete?"Through":"As it stands"}</span></div>`;
  }
  const view = GVIEW[g] || "fix";
  const toggle = `<span class="gtog">`+
    `<button data-gv="fix" data-g="${g}" class="${view==="fix"?"on":""}">Fixtures</button>`+
    `<button data-gv="tab" data-g="${g}" class="${view==="tab"?"on":""}">Table</button></span>`;
  const body = view==="tab" ? standTable(g) : (rows + foot);
  return `<div class="gcard${soc?" soc":""}">
    <div class="ghead"><span class="gnm">Group ${g}</span>${toggle}</div>
    ${body}</div>`;
}

function standTable(g){
  const st = STAND[g];
  if(!st){ return `<div class="stable"><div class="stnone">No matches played yet</div></div>`; }
  const head = `<div class="strow sthead"><span>#</span><span class="stt">Team</span>`+
    `<span>P</span><span>W</span><span>D</span><span>L</span><span>GF</span><span>GA</span><span class="stp">Pt</span></div>`;
  const rows = st.rows.map(r => `<div class="strow${r.pos<=2?" q"+r.pos:""}">`+
    `<span>${r.pos}</span>`+
    `<span class="stt"><i>${FLAG[r.team]||""}</i>${CODE[r.team]}</span>`+
    `<span>${r.P}</span><span>${r.W}</span><span>${r.D}</span><span>${r.L}</span>`+
    `<span>${r.GF}</span><span>${r.GA}</span><span class="stp">${r.Pts}</span></div>`).join("");
  return `<div class="stable">${head}${rows}</div>`;
}

function label(txt,x,w){ return `<div class="roundlabel" style="left:${x}px;top:150px;width:${w}px">${txt}</div>`; }

function koBox(no) {
  const o=byNo[no], p=pos[no];
  const w=p.w||BOXW;
  const sc=SCORES[o.id], lv=LIVE[o.id];
  const isLive   = lv!=null;
  const isFinal  = o.grp==="FINAL", isBronze=o.grp==="3RD";
  const cls = "kbox"+(isFinal?" final":"")+(isBronze?" bronze":"")+(isLive?" kbox-live":"");
  const nA=slotDisplay(o,o.a), nB=slotDisplay(o,o.b);
  function slot(name,idx) {
    const real = known(name);
    const tk   = token(name);
    const nm   = real ? `${FLAG[name]} ${name}` : shortName(name);
    const scv  = sc      ? `<span class="ksc">${sc[idx]}</span>` :
                 isLive  ? `<span class="ksc" style="color:var(--green)">-</span>` :
                           `<span class="wcell"></span>`;
    return `<div class="kteam${real?" real":""}"><span class="tk">${tk}</span><span class="knm">${nm}</span>${scv}</div>`;
  }
  const stgTxt  = isFinal?"FINAL":isBronze?"3RD PLACE":STAGE_NAME[o.grp];
  const timeStr = isLive ? `<span style="color:var(--green);font-size:13px">${lv?lv+"'":"LIVE"}</span>` : t24(o.iso);
  return `<div class="${cls}" data-id="${o.id}" style="left:${p.x}px;top:${p.y-BOXH/2}px;width:${w}px;min-height:${BOXH}px">
    <span class="alarm" style="background:${alarm(o.iso)}"></span>
    <div class="khd"><span class="stg">${stgTxt}</span><span class="mno">M${no}</span></div>
    ${slot(nA,0)}
    ${slot(nB,1)}
    <div class="kfoot"><span class="kdate">${dDM(o.iso)}</span>
      <span class="ktime">${timeStr}</span></div>
  </div>`;
}
const allNos = Object.keys(byNo).map(Number);

function renderAll() {
  computeStandings();
  resolveBracket();
  renderNextDay();
  document.getElementById("gpanelL").innerHTML = "ABCDEF".split("").map(groupCard).join("");
  document.getElementById("gpanelR").innerHTML = "GHIJKL".split("").map(groupCard).join("");
  document.getElementById("bracket").innerHTML = allNos.map(koBox).join("") +
    label("Round of 32",COLX.R32L,BOXW)+label("Round of 16",COLX.R16L,BOXW)+
    label("Quarter-finals",COLX.QFL,BOXW)+label("Semi-finals",COLX.SFL,BOXW)+
    label("Semi-finals",COLX.SFR,BOXW)+label("Quarter-finals",COLX.QFR,BOXW)+
    label("Round of 16",COLX.R16R,BOXW)+label("Round of 32",COLX.R32R,BOXW);
}

// Load cached scores before first paint
try { const c=localStorage.getItem("wc26sc"); if(c) Object.assign(SCORES,JSON.parse(c)); } catch(_){}
renderAll();

// ===================== CONNECTORS =====================
function connector(child,parent) {
  const c=pos[child], pr=pos[parent];
  let cx,px,mx;
  if (pr.side==="L"||(pr.side==="C"&&c.side==="L")) {
    cx=c.x+BOXW; px=pr.x; mx=(cx+px)/2;
  } else {
    cx=c.x; px=(pr.w?pr.x+pr.w:pr.x+BOXW); mx=(cx+px)/2;
  }
  return `M${cx} ${c.y} H${mx} V${pr.y} H${px}`;
}
let paths="";
Object.keys(pos).forEach(n => { const p=pos[n]; if(p.ch) p.ch.forEach(c => paths+=`<path d="${connector(c,n)}"/>`); });
document.getElementById("conn").innerHTML = paths;

// ===================== LIVE SCORES — football-data.org =====================
// Scores come from a serverless proxy (/api/scores) that holds the API key
// server-side and sidesteps the browser CORS block. See netlify/functions/scores.js.
// When opened locally (not on Netlify) this 404s and the board falls back to
// cached / manual scores — that's expected.
const LIVE_ENDPOINT = "/api/scores";

// TLA (3-letter code) lookup is the most reliable match method
const TLALOOKUP = {};
ALL.forEach(o => {
  if (CODE[o.a] && CODE[o.b]) TLALOOKUP[CODE[o.a]+"|"+CODE[o.b]] = o.id;
});
// Knockout boxes have placeholder teams, so match those by kick-off time instead
const KOBOXES = Object.values(byNo).map(o => ({ no:o.no, t:Date.parse(o.iso) }));

// Name normalisation fallback
const TNORM = {
  "United States":"USA","Turkiye":"Turkiye","Turkey":"Turkiye",
  "Cote d'Ivoire":"Ivory Coast","Ivory Coast":"Ivory Coast",
  "Congo DR":"DR Congo","Republic of Congo":"DR Congo",
  "Bosnia-Herzegovina":"Bosnia and Herzegovina",
  "Korea Republic":"South Korea","Republic of Korea":"South Korea",
  "Cape Verde Islands":"Cape Verde","Cabo Verde":"Cape Verde",
  "Curacao":"Curacao","IR Iran":"Iran"
};
function tn(n){ return TNORM[n]||n; }

async function fetchScores() {
  const st = document.getElementById("livestatus");
  st.dataset.state = "loading";
  try {
    const r = await fetch(LIVE_ENDPOINT, { headers:{ "accept":"application/json" } });
    if (!r.ok) {
      if (r.status===403) throw new Error("WC needs a paid football-data.org plan");
      if (r.status===404) throw new Error("Deploy to Netlify to turn on live scores");
      throw new Error("API error "+r.status);
    }
    const {matches} = await r.json();
    let changed=false, nlive=0;
    // Clear live state
    Object.keys(LIVE).forEach(k => delete LIVE[k]);
    matches.forEach(m => {
      // Try TLA first
      const htla=m.homeTeam?.tla||"", atla=m.awayTeam?.tla||"";
      let id = TLALOOKUP[htla+"|"+atla] || TLALOOKUP[atla+"|"+htla];
      // Name fallback
      if (!id) {
        const ha=tn(m.homeTeam?.shortName||m.homeTeam?.name||"");
        const aa=tn(m.awayTeam?.shortName||m.awayTeam?.name||"");
        id = TLALOOKUP[(CODE[ha]||ha)+"|"+(CODE[aa]||aa)] ||
             TLALOOKUP[(CODE[aa]||aa)+"|"+(CODE[ha]||ha)];
      }
      if (!id && m.stage && m.stage!=="GROUP_STAGE" && m.utcDate) {
        const mt=Date.parse(m.utcDate); let best=null, bd=Infinity;
        KOBOXES.forEach(k => { const dd=Math.abs(k.t-mt); if(dd<bd){ bd=dd; best=k; } });
        if (best && bd < 6*3600000) id = "m"+best.no;
      }
      if (!id) return;
      APIRAW[id]=m;
      const live = m.status==="IN_PLAY"||m.status==="PAUSED";
      const done = m.status==="FINISHED";
      if (live) { LIVE[id]=String(m.minute||""); nlive++; }
      const ft = m.score?.fullTime;
      if ((live||done) && ft?.home!=null) {
        const ns=[ft.home,ft.away];
        if (!SCORES[id]||SCORES[id][0]!==ns[0]||SCORES[id][1]!==ns[1]) {
          SCORES[id]=ns; changed=true;
        }
      }
    });
    const now = new Date().toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});
    st.dataset.state = nlive ? "live" : "ok";
    st.querySelector(".ltxt").textContent = nlive ? `${nlive} match${nlive>1?"es":""} LIVE` : "Live scores";
    st.querySelector(".ltime").textContent = "\u00b7 "+now;
    if (changed||nlive) renderAll();
    try { localStorage.setItem("wc26sc",JSON.stringify(SCORES)); } catch(_){}
  } catch(e) {
    st.dataset.state = "error";
    st.querySelector(".ltxt").textContent = "Scores offline";
    st.querySelector(".ltime").textContent = "\u00b7 "+e.message.slice(0,46);
    // Show cached data anyway
    try { const c=localStorage.getItem("wc26sc"); if(c){Object.assign(SCORES,JSON.parse(c));renderAll();} } catch(_){}
  }
}
fetchScores();
setInterval(fetchScores, 60000);

// ===================== DETAIL MODAL =====================
const scrim=document.getElementById("scrim"), detail=document.getElementById("detail");
function teamBlock(name) {
  if (known(name))
    return `<div class="dteam"><span class="dfl">${FLAG[name]}</span><span class="dnm">${name}</span><span class="dtk">${CODE[name]}</span></div>`;
  return `<div class="dteam ph"><span class="dfl" style="opacity:.4">&#x1F3C6;</span><span class="dnm">${shortName(name)}</span><span class="dtk">${token(name)}</span></div>`;
}
function openDetail(id) {
  const o=MAP[id]; if(!o) return;
  curDetailId = id;
  const sc=SCORES[o.id], lv=LIVE[o.id];
  const t=timeBNE(o.iso), vl=venueLocal(o);
  const nA=slotDisplay(o,o.a), nB=slotDisplay(o,o.b);
  const stg=o.isKo?(o.grp==="FINAL"?"Final":o.grp==="3RD"?"Third place play-off":STAGE_NAME[o.grp]):"Group "+o.grp;
  const isLive=lv!=null;
  const z=ZONES[ZONE];
  const mid = sc     ? `<div class="dvs score">${sc[0]} &ndash; ${sc[1]}</div>` :
               isLive ? `<div class="dvs live">${lv?lv+"'":"LIVE"}</div>` :
                        `<div class="dvs">v</div>`;
  const resultRow = sc     ? `<div class="drow"><span class="dk">Result</span><span class="dv"><b>FT: ${sc[0]}&ndash;${sc[1]}</b></span></div>` :
                    isLive ? `<div class="drow"><span class="dk">Result</span><span class="dv" style="color:var(--green)"><b>In play${lv?" &middot; "+lv+"'":""}</b></span></div>` :
                             `<div class="drow"><span class="dk">Result</span><span class="dv"><small>Not yet played — auto-updates on finish.</small></span></div>`;
  detail.innerHTML = `
    <div class="dhead${o.soc?" soc":""}"><span class="dstg">${stg}</span>
      <span class="dmno">${o.isKo?"Match "+o.no:"Match-day"}</span></div>
    <div class="dmatch">${teamBlock(nA)}${mid}${teamBlock(nB)}</div>
    <div class="dmeta">
      <div class="drow"><span class="dk">${z.label}</span><span class="dv"><b>${t.hm}</b><span class="ap"> ${t.ap}</span> &nbsp;<small>${dLong(o.iso)} &middot; ${z.abbr}</small></span></div>
      ${vl?`<div class="drow"><span class="dk">Local kick-off</span><span class="dv">${vl.txt} <small>${vl.zone}</small></span></div>`:""}
      <div class="drow"><span class="dk">Venue</span><span class="dv">${o.venue} <small>&middot; ${o.city}</small></span></div>
      ${resultRow}
    </div>
    <div class="dhint">Click anywhere outside to close</div>`;
  scrim.classList.add("on");
}

function closeDetail(){ scrim.classList.remove("on"); }
document.getElementById("poster").addEventListener("click", e => {
  const tog=e.target.closest("[data-gv]");
  if(tog){ GVIEW[tog.dataset.g]=tog.dataset.gv; renderAll(); return; }
  const el=e.target.closest("[data-id]"); if(el) openDetail(el.dataset.id);
});
scrim.addEventListener("click", e => { if(e.target===scrim) closeDetail(); });
document.getElementById("dclose").addEventListener("click", closeDetail);
document.addEventListener("keydown", e => { if(e.key==="Escape") closeDetail(); });

// ===================== ZOOM / PAN / FIT =====================
const W=2760, H=1720, poster=document.getElementById("poster");
let fitScale=1, scale=1, tx=0, ty=0, userZoom=false;
function applyT(){ poster.style.transform=`translate(-50%,-50%) translate(${tx}px,${ty}px) scale(${scale})`; }
function fit(){
  fitScale=Math.min(innerWidth/W,innerHeight/H)*0.985;
  if(!userZoom){ scale=fitScale; tx=0; ty=0; applyT(); }
}
addEventListener("resize",fit); fit();

addEventListener("wheel", e => {
  if(scrim.classList.contains("on")) return;
  e.preventDefault();
  const rect=poster.getBoundingClientRect();
  const ox=e.clientX-rect.left, oy=e.clientY-rect.top;
  const factor=e.deltaY<0?1.12:0.89;
  const ns=Math.max(fitScale*0.9,Math.min(fitScale*3.2,scale*factor));
  const k=ns/scale;
  tx-=(ox)*(k-1); ty-=(oy)*(k-1);
  scale=ns; userZoom=true; applyT();
  clearTimeout(zt); zt=setTimeout(()=>{ if(Math.abs(scale-fitScale)<0.02){userZoom=false;fit();} },300);
},{passive:false});
let zt;

let dragging=false, sx, sy;
poster.addEventListener("pointerdown", e => {
  if(scrim.classList.contains("on")) return;
  dragging=true; sx=e.clientX-tx; sy=e.clientY-ty; poster.style.cursor="grabbing";
});
addEventListener("pointermove", e => { if(!dragging) return; tx=e.clientX-sx; ty=e.clientY-sy; userZoom=true; applyT(); });
addEventListener("pointerup",   ()  => { dragging=false; poster.style.cursor=""; });
addEventListener("dblclick",    e   => { if(e.target.closest(".kbox")||e.target.closest(".grow")) return; userZoom=false; fit(); });

setTimeout(() => { document.getElementById("zoomhint").style.opacity="0"; }, 4200);

// ===================== TIMEZONE SWITCHER + TIMERS =====================
function syncZoneUI(){
  const z=ZONES[ZONE], k=document.getElementById("tzkick");
  if(k) k.innerHTML = `<i></i>${z.label} Time &middot; ${z.abbr} (${utcLabel(z.off)})<i></i>`;
}
(function initTz(){
  const sel=document.getElementById("tzsel");
  sel.innerHTML = Object.keys(ZONES).map(k => `<option value="${k}">${ZONES[k].label} &middot; ${ZONES[k].abbr}</option>`).join("");
  sel.value = ZONE;
  sel.addEventListener("change", () => {
    ZONE = sel.value;
    try { localStorage.setItem("wc26zone", ZONE); } catch(_){}
    syncZoneUI();
    renderAll();
    if(scrim.classList.contains("on") && curDetailId) openDetail(curDetailId);
  });
  document.getElementById("tzpick").addEventListener("pointerdown", e => e.stopPropagation());
  syncZoneUI();
})();

setInterval(tickCount, 1000);
setInterval(renderNextDay, 60000);
</script>
